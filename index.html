<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초대장</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');
  :root { 
    --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a; --border-focus: #555;
    --text: #e8e4dc; --text-muted: #666; --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12); --error: #e05c5c; --success: #6ec9a9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', serif; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,169,110,0.04) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .card { position: relative; z-index: 1; width: 100%; max-width: 400px; margin: 24px; padding: 52px 44px; background: var(--surface); border: 1px solid var(--border); animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .card::before, .card::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; opacity: 0.5; }
  .card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 28px; opacity: 0.8; }
  h1 { font-size: 26px; font-weight: 300; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 10px; }
  .subtitle { font-size: 13px; color: var(--text-muted); font-weight: 300; line-height: 1.6; margin-bottom: 40px; font-family: 'DM Mono', monospace; }
  input[type="text"] { width: 100%; padding: 14px 18px; background: transparent; border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 300; letter-spacing: 0.15em; outline: none; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none; margin-bottom: 16px; }
  input[type="text"]::placeholder { color: var(--text-muted); letter-spacing: 0.1em; font-size: 13px; }
  input[type="text"]:focus { border-color: var(--border-focus); background: rgba(255,255,255,0.02); }
  input[type="text"].error { border-color: var(--error); animation: shake 0.35s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake { 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(3px); } 30%, 50%, 70% { transform: translateX(-4px); } 40%, 60% { transform: translateX(4px); } }
  button { width: 100%; padding: 14px; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, color 0.2s; }
  button:hover { background: var(--accent); color: #0e0e0e; }
  button:active { opacity: 0.8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg { margin-top: 16px; font-family: 'DM Mono', monospace; font-size: 12px; text-align: center; min-height: 18px; }
  .msg.error { color: var(--error); }
  .msg.success { color: var(--success); }
  .msg.hidden { opacity: 0; }
  .divider { width: 32px; height: 1px; background: var(--border); margin: 36px 0; }
  .footer { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); opacity: 0.4; letter-spacing: 0.1em; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 1px solid rgba(201,169,110,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Private Invitation</div>
  <h1>초대장을<br>확인합니다</h1>
  <p class="subtitle">발급받은 코드를 입력하세요</p>
  <input type="text" id="pw" placeholder="초대 코드 입력" autocomplete="off" autocorrect="off" spellcheck="false" />
  <button id="btn" onclick="checkPassword()">확인하기</button>
  <div class="msg hidden" id="msg"></div>
  <div class="divider"></div>
  <div class="footer">본 초대장은 수신인 전용입니다</div>
</div>
<script>
  // ★ Apps Script 웹앱 URL을 여기에 붙여넣으세요 (최초 1회만)
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxoMscxG2kP00ycQsm91mGzvor50RbzE221cD-1ayaNt2K8f3sNYYf0-2vtPNqowfvpkw/exec';

  const input = document.getElementById('pw');
  const btn   = document.getElementById('btn');
  const msg   = document.getElementById('msg');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  input.addEventListener('input',   () => { input.classList.remove('error'); setMsg('', ''); });

  function setMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg ' + (text ? type : 'hidden');
  }

  async function checkPassword() {
    const val = input.value.trim();
    if (!val) { input.focus(); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>확인 중';
    setMsg('', '');
    try {
      const res  = await fetch(SCRIPT_URL + '?pw=' + encodeURIComponent(val));
      const data = await res.json();
      if (data.url) {
        setMsg('확인되었습니다. 이동합니다...', 'success');
        setTimeout(() => { window.location.href = data.url; }, 800);
      } else {
        input.classList.add('error');
        setMsg('코드가 올바르지 않습니다', 'error');
        btn.disabled = false;
        btn.innerHTML = '확인하기';
        input.select();
      }
    } catch (e) {
      setMsg('오류가 발생했습니다. 잠시 후 다시 시도하세요', 'error');
      btn.disabled = false;
      btn.innerHTML = '확인하기';
    }
  }
</script>
</body>
</html>
